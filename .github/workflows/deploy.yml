name: Deploy

# Deploys the canonical repo via GitHub Actions -> Wrangler (NOT the Cloudflare
# GitHub App). Every push to main runs the test suite; the deploy step runs only
# if tests pass, so a red suite can never ship.
#
# Self-hosters do NOT use this workflow: the "Deploy to Cloudflare" button forks
# the repo and wires up Workers Builds (Cloudflare-side CI) automatically. The
# job below is guarded to the canonical repo so a fork never runs a deploy it
# has no CLOUDFLARE_* secrets for.
#
# Mirrors agentsync-remote/.github/workflows/deploy.yml and
# context-keeper-remote/.github/workflows/deploy.yml.

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Only the canonical repo deploys via GitHub Actions; forks deploy via the
    # Deploy to Cloudflare button + Workers Builds.
    if: github.repository == 'jarmstrong158/cambium-remote'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          # Wrangler 4.x requires Node >= 22.
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npx vitest run

      - name: Deploy to Cloudflare Workers
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
